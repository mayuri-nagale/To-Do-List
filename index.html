<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1><img class="headImg" src="imgs/img.png">My Todo List</h1>
        <p class="msg">Add your tasks, stay organized and get things done.</p>
        <div class="input">
            <input class="inp" type="text" placeholder="What do you need to do?">
            <button class="btn">+ Add</button>
        </div>
        <div class="line">
        </div>

        <div class="task">
            <p>Your Task</p>
            <button id="no">0</button>
        </div>

        <div class="taskDiv">
            <div class="emptyState">
                <img src="imgs/img2.png" class="notask">
                <h3>No task added yet!</h3>
                <p>Add a task above to get started.</p>
            </div>

            <div class="task-list">

            </div>
        </div>

        <p class="msg"><img id="heart" src="imgs/heart.png"> Stay productive and keep going!</p>

    </div>

    <script src="script.js"></script>

</body>

</html>
